name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
        env:
          # Build will work without these, but they're needed for full functionality
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy' }}
          DB_HOST: ${{ secrets.DB_HOST || 'localhost' }}
          DB_USER: ${{ secrets.DB_USER || 'root' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'password' }}
          DB_NAME: ${{ secrets.DB_NAME || 'smart_library' }}
      
      - name: Lint
        run: npm run lint || true

